spring:
  application:
    name: roomiehub

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/RoomieHub}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:newpassword}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate          # never 'update' in production
    show-sql: false               # set to true only for debugging
    open-in-view: false           # best practice to avoid N+1 queries
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20

  flyway:
    enabled: true                 # you have migrations, so enable it
    baseline-on-migrate: true
    validate-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}   # set a password in production
      database: ${REDIS_DB:0}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
        provider:
          google:
            issuer-uri: https://accounts.google.com
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/master

  web:
    error:
      include-binding-errors: always
      include-message: always
  docker:
    compose:
      enabled: false

cloudinary:
  cloud-name: ddpatzqpg               # consider moving to env var as well
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

server:
  port: 8081

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate: WARN
    org.roomrental.group.RoomieHub: DEBUG   # your package
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"