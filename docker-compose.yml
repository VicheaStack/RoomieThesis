version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: RoomieHub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: newpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - roomiehub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d RoomieHub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - roomiehub-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0
    container_name: roomiehub-keycloak
    restart: unless-stopped
    command:
      - start-dev
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    networks:
      - roomiehub-network

  app:
    image: vicheadev/roomiehub-app:latest   # ← use your pushed image
    restart: unless-stopped
    ports:
      - "8081:8081"                         # ← changed from 8082 to standard 8080 (optional)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # added docker this line below to tell spring boot to use your docker properties
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/RoomieHub
      DB_USERNAME: postgres
      DB_PASSWORD: newpassword
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    env_file:
      - docker.env
    networks:
      - roomiehub-network

volumes:
  postgres_data:

networks:
  roomiehub-network:
    driver: bridge